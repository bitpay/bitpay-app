appId: com.bitpay.wallet
---
- launchApp:
    clearState: true

# Onboarding start - wait longer for cold start on CI
- extendedWaitUntil:
    visible:
      id: "onboarding-start-view"
    timeout: 600000
- takeScreenshot: "01-onboarding-start"
- waitForAnimationToEnd
- tapOn:
    id: "continue-without-an-account-button"

# Notifications screen
- extendedWaitUntil:
    visible:
      id: "set-notifications-view"
    timeout: 15000
- takeScreenshot: "02-notifications"
- waitForAnimationToEnd
- tapOn:
    id: "skip-button"
- takeScreenshot: "03-after-notifications-skip"

# Protect your wallet (security) screen
- extendedWaitUntil:
    visible:
      id: "security-view"
    timeout: 30000
- takeScreenshot: "04-security-view"
- waitForAnimationToEnd
- tapOn:
    id: "skip-button"
- takeScreenshot: "05-after-security-skip"

# Create key screen
- extendedWaitUntil:
    visible:
      id: "create-key-view"
    timeout: 15000
- takeScreenshot: "06-create-key"
- waitForAnimationToEnd
- tapOn:
    id: "i-already-have-a-key-button"

# Import screen - enter seed phrase
- extendedWaitUntil:
    visible:
      id: "import-view"
    timeout: 15000
- takeScreenshot: "07-import"
- tapOn:
    id: "import-text-input"
- inputText: "gown pizza sell law yard laundry gown action enemy speed embark awkward"

# Dismiss keyboard by tapping outside the input
- tapOn:
    point: "50%,20%"

# Import wallet
- tapOn:
    id: "import-wallet-button"

# Wait for import to complete and terms screen to appear
- extendedWaitUntil:
    visible:
      id: "terms-of-use-container"
    timeout: 60000
- takeScreenshot: "08-terms"

# Important - tap all 3 checkboxes and agree
- assertVisible:
    id: "terms-of-use-container"
- tapOn:
    id: "first-term-checkbox"
- tapOn:
    id: "second-term-checkbox"
- tapOn:
    id: "third-term-checkbox"
- tapOn:
    id: "agree-and-continue-button"

# Verify home screen is visible
- assertVisible:
    id: "portfolio-balance-toggle"
- takeScreenshot: "09-home"
