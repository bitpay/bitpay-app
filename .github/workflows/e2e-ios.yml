name: E2E iOS

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  e2e-ios:
    name: E2E iOS Smoke
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create env file
        env:
          ENV_FILE: ${{ secrets.ENV_DEVELOPMENT }}
        run: |
          echo "$ENV_FILE" > .env.development
          echo "IS_MAESTRO=true" >> .env.development

      - name: Create Sentry properties
        run: |
          echo "${{ secrets.SENTRY_PROPERTIES }}" > sentry.properties
          echo "${{ secrets.SENTRY_PROPERTIES }}" > ios/sentry.properties
          echo "${{ secrets.SENTRY_PROPERTIES }}" > android/sentry.properties

      - name: Set native config values
        run: yarn set:dev

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7.6'
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install

      - name: Cache Maestro
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}
          restore-keys: maestro-${{ runner.os }}

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Cache Xcode build products
        uses: actions/cache@v4
        with:
          path: ios/build/Build/Products
          key: xcode-products-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'yarn.lock') }}
          restore-keys: xcode-products-${{ runner.os }}-

      - name: Build iOS app for simulator
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: true
        run: |
          xcodebuild \
            -workspace ios/BitPayApp.xcworkspace \
            -scheme BitPayApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="DEBUG MAESTRO" \
            build

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16" | head -1 | grep -E -o '\(([0-9A-F-]+)\)' | tr -d '()')
          xcrun simctl boot "$UDID"
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Install app on simulator
        run: |
          APP_PATH=$(find ios/build -name "*.app" | head -1)
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      - name: Run Maestro smoke tests
        run: maestro test .maestro/flows/ --format junit --output maestro-results.xml
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 120000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: maestro-ios-results
          path: |
            maestro-results.xml
            ~/.maestro/tests/
          retention-days: 7

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: maestro-ios-screenshots
          path: ~/.maestro/tests/**/*.png
          retention-days: 7

      - name: Comment on PR (failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ❌ E2E iOS Failed\n\nThe Maestro smoke test failed on this PR.\n\n[View run logs](${runUrl})\n\nScreenshots and test results are available in the run artifacts.`
            });

      - name: Comment on PR (success)
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ✅ E2E iOS Passed\n\nAll Maestro smoke tests passed.\n\n[View run](${runUrl})`
            });
